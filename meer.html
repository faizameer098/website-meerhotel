<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Meer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <h1>Hotel Meer</h1>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#rooms">Rooms</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero" id="home">
        <div class="hero-content">
            <h2>Book your perfect stay with us today</h2>
            <a href="#contact" class="btn">BOOK NOW</a>
        </div>
    </section>

    <section id="rooms">
        <h2 style="text-align: center;">Our Rooms</h2>
        <div>
            <h3>Deluxe Room</h3>
            <p>$120/Night</p>
            <p>King bed, Free WiFi, Sea view</p>
        </div>
        <div>
            <h3>Family Room</h3>
            <p>$180/Night</p>
            <p>2 Queen beds, kids stay free</p>
        </div>
    </section>

    <section class="contact" id="contact">
        <h2>Contact & Booking</h2>
        <form>
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <input type="date" placeholder="Check-in Date">
            <textarea placeholder="Your Message"></textarea>
            <button type="submit" class="btn">Send Request</button>
        </form>
    </section>

    <footer>
        <p>© 2026 Hotel Meer. All Rights Reserved. Arifwala Pakistan</p>
    </footer>
</body>
</html>
